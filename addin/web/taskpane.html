<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=Edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ReconAgent</title>
  <link rel="stylesheet" href="./taskpane.css" />
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <script defer src="./taskpane.js"></script>
</head>
<body>
  <main class="wrap">
    <h2>ReconAgent</h2>
    <p class="subtitle">Run reconcile, writeback, and validate from Excel.</p>

    <label for="apiBaseUrl">API Base URL</label>
    <input id="apiBaseUrl" type="text" value="http://localhost:8000" />

    <label for="entity">Entity</label>
    <input id="entity" type="text" placeholder="TPG RISE" />

    <label for="period">Period</label>
    <input id="period" type="text" placeholder="2025-01-31" />

    <div class="actions">
      <button id="reconcileBtn" type="button">Reconcile</button>
      <button id="validateBtn" type="button">Validate</button>
    </div>

    <label for="updatesJson">Writeback Updates (JSON array)</label>
    <textarea id="updatesJson" rows="9">[]</textarea>
    <button id="writebackBtn" type="button">Writeback</button>

    <h3>Response</h3>
    <pre id="responseOutput"></pre>
  </main>
</body>
</html>
